defaults:
  - _self_

root_output_dir: ???

raw_input_dir: ${root_output_dir}/raw_input
pre_MEDS_dir: ${root_output_dir}/pre_MEDS
MEDS_output_dir: ${root_output_dir}/MEDS_output

stage_runner_fp: null

do_download: True
do_overwrite: False
do_copy: False
do_demo: False

# Number of parallel HTTPS connections used during the raw download stage.
# PhysioNet rate-limits each TCP connection to ~50 KB/s but does not throttle
# aggregate per-IP throughput, so 8 workers gives roughly 8x faster download
# (~400 KB/s) without tripping their 429 backoff. Set to 1 to restore strictly
# sequential behavior.
download_workers: 8

log_dir: ${root_output_dir}/.logs

# Hydra
hydra:
  job:
    name: full_extraction_${now:%Y-%m-%d_%H-%M-%S}
  run:
    dir: ${log_dir}
  sweep:
    dir: ${log_dir}
